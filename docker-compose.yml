version: "3.8"

services:

  app:

    image: swift-deploy-1-node:latest

    environment:

      - MODE=stable

      - APP_VERSION=v1

      - APP_PORT=3000

    networks:

      - swiftdeploy-net

    restart: always

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]

      interval: 10s

      retries: 5

  nginx:

    image: nginx:latest

    ports:

      - "8080:80"

    volumes:

      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:

      - app

    networks:

      - swiftdeploy-net

networks:

  swiftdeploy-net:

    driver: bridge

volumes:

  logs: